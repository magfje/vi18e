name: Release

# Runs on every version tag (e.g. v0.2.0).
# Can also be triggered manually from the Actions tab for test builds.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # required to create releases and upload assets

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Build on each platform ────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: --win --x64
          - os: macos-latest
            args: --mac
          - os: ubuntu-latest
            args: --linux --x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Package
        run: bunx electron-builder ${{ matrix.args }}
        env:
          # electron-builder uses this to publish directly to GitHub Releases
          # if you add --publish always; here we publish in a separate job.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          if-no-files-found: error
          path: |
            release/**/*.exe
            release/**/*.dmg
            release/**/*.AppImage

  # ── Create GitHub Release and attach all binaries ─────────────────────────
  publish:
    needs: build
    runs-on: ubuntu-latest
    # Only publish when a real tag was pushed — not on workflow_dispatch
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          draft: true               # review before making public
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
